# Local, Docker-only stack for the mssql-jdbc OTel POC, wired to the team's
# INTERNAL telemetry pipeline instead of the OSS one.
#
#   driver --OTLP/HTTP:4318--> otelcol-arcdata --deltalake--> Azure Delta Lake
#                                       \                      (token-server = Managed Identity,
#                                        \                      delta-bulk-loader = Event Hub sink)
#                                         `--otlp:18889------> aspire-dashboard (local metrics/traces/logs UI)
#   driver --TDS:1433---------> sqlserver (in-network only)
#
# Driven by ./.scripts/dev.sh. Open the Aspire Dashboard at http://localhost:18888
# (anonymous) for driver metrics, traces, and structured logs.
#
# Azure prerequisites on the host: `az login` (the token-server vends Managed
# Identity tokens from the mounted ~/.azure session) and AcrPull on
# arcdataanalyticsacr.azurecr.io. See README.md.

# Shared definition for the Java builder/runner image. `app` is a manual, one-shot
# runner (smoke test, timed burst, probes); `loadgen` runs the generator forever
# for live dashboards. Both reuse the single baked image and emit OTLP to arcdata.
x-otel-app: &otel-app
  build:
    context: ../..
    dockerfile: docs/otel-poc/Dockerfile
  image: mssql-jdbc-otel-poc:local
  working_dir: /work
  volumes:
    - ../..:/work
    - "${AZURE_HOST_PATH:-${HOME}/.azure}:/root/.azure"
  environment:
    # Base JDBC URL consumed by OtelPocLoadGen (env) and OtelPocSmokeTest
    # (AbstractTest). dev.sh / the load generator append the otel* properties.
    mssql_jdbc_test_connection_properties: "jdbc:sqlserver://sqlserver:1433;user=sa;password=${MSSQL_SA_PASSWORD:-Otel_Poc_Str0ng!Pass};trustServerCertificate=true;"
  depends_on:
    sqlserver:
      condition: service_healthy
    otelcol-arcdata:
      condition: service_started

services:
  sqlserver:
    image: ${SQL_SERVER_IMAGE:-mcr.microsoft.com/mssql/server:2022-latest}
    container_name: mssql-jdbc-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Otel_Poc_Str0ng!Pass}"
      MSSQL_PID: "Developer"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      # 2022 image ships mssql-tools18 (-C trusts the self-signed cert); the
      # arm64 azure-sql-edge fallback ships mssql-tools v17. Try both.
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"${MSSQL_SA_PASSWORD:-Otel_Poc_Str0ng!Pass}\" -Q 'SELECT 1' -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD:-Otel_Poc_Str0ng!Pass}\" -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 45s

  # Vends Entra/Managed-Identity tokens to the collector + bulk loader by thinly
  # wrapping the host `az` CLI session mounted read-only at /host/.azure.
  token-server:
    build:
      context: ./internal/token-server
    container_name: mssql-jdbc-token-server
    environment:
      IDENTITY_HEADER: "${IDENTITY_HEADER:-e2e-deltalake-secret}"
    volumes:
      - "${AZURE_HOST_PATH:-${HOME}/.azure}:/host/.azure:ro"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  # MISE container sidecar — production-style inbound AuthN.
  mise:
    image: "${MISE_IMAGE:-azurehybriddatadogfood.azurecr.io/artifact/ca486455-1a37-40b8-9d7c-9fb79233c8f0/official/misecontainer:20260622.1}"
    container_name: mssql-jdbc-mise
    environment:
      MISE_APPSETTINGS_LOCATION: /mise/mise.appsettings.json
    volumes:
      - ./internal/mise/mise.appsettings.json:/mise/mise.appsettings.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/readyz"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 10s
    restart: unless-stopped

  # The team's internal OTel collector. Receives the driver's OTLP, fans every
  # signal out to Azure Delta Lake (deltalake exporter) and the Aspire Dashboard
  # (otlp exporter). Config is vendored at internal/otelcol-arcdata/.
  otelcol-arcdata:
    image: "${OTELCOL_ARCDATA_IMAGE:-arcdataanalyticsacr.azurecr.io/protobus-benchmark/otelcol-arcdata:protobus-benchmark-20260617224128}"
    container_name: mssql-jdbc-otelcol-arcdata
    depends_on:
      token-server:
        condition: service_healthy
      mise:
        condition: service_healthy
    environment:
      CONFIG: "/etc/deltalake-e2e.yaml"
      # Managed Identity via the token-server sidecar.
      IDENTITY_ENDPOINT: "http://token-server:8080/metadata/identity/oauth2/token"
      IDENTITY_HEADER: "${IDENTITY_HEADER:-e2e-deltalake-secret}"
      IMDS_ENDPOINT: "http://token-server:8080/metadata/identity/oauth2/token"
      # Azure Delta Lake target (override to point at your own sandbox).
      STORAGE_ACCOUNT: "${STORAGE_ACCOUNT:-mdrrahmansandbox}"
      STORAGE_CONTAINER: "${STORAGE_CONTAINER:-onelake}"
      ROOT_PATH: "${ROOT_PATH:-arcdata-otel-poc}"
      EVENT_HUB_NAMESPACE: "${EVENT_HUB_NAMESPACE:-mdrrahmansandbox.servicebus.windows.net}"
      EVENT_HUB_NAME: "${EVENT_HUB_NAME:-delta-bulk-loader}"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID:-72f988bf-86f1-41af-91ab-2d7cd011db47}"
    volumes:
      - ./internal/otelcol-arcdata/deltalake-e2e.yaml:/etc/deltalake-e2e.yaml:ro
    ports:
      - "4317:4317"   # OTLP/gRPC
      - "4318:4318"   # OTLP/HTTP (driver -> collector)
      - "13133:13133" # healthcheckv2 probe (/health/status)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:13133/health/status"]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 10s
    restart: unless-stopped

  # MirrorMaker / Delta Bulk Loader: consumes the collector's Event Hub
  # notifications and commits the Delta log in Azure Storage.
  delta-bulk-loader:
    image: "${DELTA_BULK_LOADER_IMAGE:-arcdataanalyticsacr.azurecr.io/artifact/ca486455-1a37-40b8-9d7c-9fb79233c8f0/buddy/adshybrid/dataplane-mirror-maker-service:latest}"
    container_name: mssql-jdbc-delta-bulk-loader
    entrypoint: ["/usr/bin/dotnet", "/app/Dataplane.StreamProcessing.MirrorMaker.dll"]
    depends_on:
      token-server:
        condition: service_healthy
    environment:
      IDENTITY_ENDPOINT: "http://token-server:8080/metadata/identity/oauth2/token"
      IDENTITY_HEADER: "${IDENTITY_HEADER:-e2e-deltalake-secret}"
      IMDS_ENDPOINT: "http://token-server:8080/metadata/identity/oauth2/token"
      TOKEN_CREDENTIAL_MODE_OVERRIDE: "ManagedIdentityCredential"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otelcol-arcdata:4317"
      AddLogsOtlpExporter: "false"
      AddMetricsOtlpExporter: "false"
      AddTracingOtlpExporter: "false"
    volumes:
      - ./internal/delta-bulk-loader/appsettings.json:/app/appsettings.json:ro
    restart: unless-stopped

  # .NET Aspire Dashboard — unified local UI for metrics, traces, and logs.
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:8.0
    container_name: mssql-jdbc-aspire-dashboard
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888" # Dashboard UI
      - "18889:18889" # OTLP ingress (collector -> dashboard)
    restart: unless-stopped

  # Portainer CE — local Docker management UI (browse container logs, stats, shells).
  # Pre-seeded admin so there is no first-run setup wizard and no "instance timed out
  # for security" lockout: log in with admin / the password in
  # internal/portainer/admin-password (the POC SA password by default).
  portainer:
    image: portainer/portainer-ce:latest
    container_name: mssql-jdbc-portainer
    command: ["--admin-password-file", "/run/portainer/admin-password"]
    ports:
      - "9443:9443" # HTTPS UI (self-signed cert)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - ./internal/portainer/admin-password:/run/portainer/admin-password:ro
    restart: unless-stopped

  # Manual one-shot runner. Never auto-starts (tools profile); dev.sh invokes it
  # via `docker compose run --rm app <mvn ...>` for test-compile, the smoke test,
  # the timed burst, and the health/flow probes.
  app:
    <<: *otel-app
    container_name: mssql-jdbc-otel-app
    profiles: ["tools"]

  # Long-running load generator for live dashboards. Started by dev.sh after the
  # green gates pass; keeps shipping metrics + traces until `dev.sh down`.
  loadgen:
    <<: *otel-app
    container_name: mssql-jdbc-otel-loadgen
    profiles: ["loadgen"]
    restart: unless-stopped
    command:
      - mvn
      - -B
      - -Pjre11
      - org.codehaus.mojo:exec-maven-plugin:3.1.0:java
      - -Dexec.classpathScope=test
      - -Dexec.mainClass=com.microsoft.sqlserver.jdbc.otel.OtelPocLoadGen
      - -Dexec.args=forever
      - -DotelEndpoint=http://otelcol-arcdata:4318/v1/metrics
      - -DotelExportInterval=5
      # OTLP bearer JWT from the Azure CLI credential, independent of the SQL login.
      - -DotelUseSqlAccessToken=false
      - -DotelAccessTokenCallbackClass=com.microsoft.sqlserver.jdbc.otel.AzureCliAccessTokenCallback
      # MISE inbound auth requires the telemetry-kind header plus the Original-Uri /
      # Original-Method / X-Forwarded-For headers an ingress would normally inject
      # (there is no ingress locally, so the driver sends them itself).
      - -DotelHeaders=x-ms-telemetry-kind=mssql-jdbc-poc,Original-Uri=/v1/metrics,Original-Method=POST,X-Forwarded-For=127.0.0.1

volumes:
  mssql-data:
  portainer_data:
