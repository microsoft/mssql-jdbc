# otelcol-arcdata config for the mssql-jdbc OTel POC.
#
# Adapted from the protobus-benchmark e2e config. The mssql-jdbc driver ships
# OTLP/HTTP (metrics + traces) to :4318; this collector fans every signal out to
#   1. deltalake/otap  -> Azure Delta Lake (Managed Identity via token-server,
#                         notifications via Event Hub consumed by delta-bulk-loader)
#   2. otlp/aspire     -> the .NET Aspire Dashboard (local metrics/traces/logs UI)
#   3. debug           -> stdout, so dev.sh can prove telemetry reached the collector
#
# The protobus (air_quality) receiver/exporter/pipeline from the benchmark config
# is intentionally removed — there is no producer-csharp in this POC.

extensions:
  healthcheckv2:
    use_v2: true
    component_health:
      include_permanent_errors: false
      include_recoverable_errors: false
    http:
      endpoint: 0.0.0.0:13133
      status:
        enabled: true
        path: "/health/status"

  misecontainerauth:
    first_party_app_ids:
      - 04b07795-8ddb-461a-bbee-02f9e1bf7b46   # Azure CLI (the loadgen's token appid)
    first_party_tenant_ids:
      - 72f988bf-86f1-41af-91ab-2d7cd011db47   # Microsoft tenant
    first_party_subscriptions:
      - 00000000-0000-0000-0000-000000000000   # Unused on the standalone-identity path
    http:
      mise_service_endpoint: http://mise:5000/ValidateRequest

receivers:
  # Native OTLP from the mssql-jdbc driver (and anything else OTLP).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 64
        include_metadata: true
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true
        # MISE auth on the HTTP path only (the driver/loadgen path). gRPC :4317 stays
        # open so the delta-bulk-loader's internal telemetry keeps flowing unauthenticated.
        auth:
          authenticator: misecontainerauth

processors:
  memory_limiter:
    check_interval: 1s
    # Sized for a normal dev box (the benchmark config assumed ~124 GiB). The POC
    # workload is tiny, so these limits never actually trip.
    limit_mib: 2048
    spike_limit_mib: 512
  batch:
    send_batch_size: 8192
    send_batch_max_size: 8192
    timeout: 1s

  # The custom metadataprocessor copies selected
  # incoming OTLP request headers onto resource attributes
  metadataprocessor:
    client_addr_key: "client.address"
    headers:
      authorization: "http.request.header.authorization"
      user-agent: "http.request.header.user_agent"
      content-type: "http.request.header.content_type"

exporters:
  # OTAP / native OTLP path -> Azure Delta Lake.
  deltalake/otap:
    storage_url: "https://${env:STORAGE_ACCOUNT}.dfs.core.windows.net"
    container: "${env:STORAGE_CONTAINER}"
    root_path: "${env:ROOT_PATH}"

    auth:
      authentication_method: "SystemManagedIdentity"

    # Notification path: Event Hub the C# Delta Bulk Loader (MirrorMaker) consumes
    # from, plus the Bulk Loader's own ADLS credential type.
    delta_bulk_loader:
      storage_account_csharp_named_auth_type: "ManagedIdentityCredential"
      event_hub:
        enabled: true
        namespace: "${env:EVENT_HUB_NAMESPACE}"
        name: "${env:EVENT_HUB_NAME}"
        tenant_id: "${env:AZURE_TENANT_ID}"
        publish_timeout: 30s
        auth:
          authentication_method: "SystemManagedIdentity"

    parquet:
      compression: "zstd"
      row_group_target_rows: 1000000
      page_buffer_size: 524288
      data_page_size_bytes: 2097152

    # Flush promptly so Delta commits show up during the POC instead of waiting
    # for the benchmark's 30-minute / 6M-row window.
    buffer:
      max_buffer_rows: 1000
      flush_timeout: 60s
      flush_check_interval: 5s
      # High enough that flushes are driven by the row/timeout triggers above
      # rather than by an absolute host-memory threshold (which would otherwise
      # trip constantly and spam Azure with tiny flushes).
      max_memory_usage_in_mega_bytes: 65536

    partition:
      default:
        time: "event_year_date_hour"
        data_columns: ["application"]

    sending_queue:
      enabled: false
    timeout: 60s
    marshaler: otap_parquet

  # Local viz path -> .NET Aspire Dashboard OTLP ingest (gRPC on :18889).
  otlp/aspire:
    endpoint: http://aspire-dashboard:18889
    tls:
      insecure: true

  debug:
    verbosity: basic

  debug/headers:
    verbosity: basic

service:
  extensions: [healthcheckv2, misecontainerauth]
  telemetry:
    resource:
      service.name: otelcol-arcdata
    metrics:
      readers:
        - periodic:
            interval: 15000
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://aspire-dashboard:18889
                insecure: true
    traces:
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://aspire-dashboard:18889
                insecure: true
    logs:
      level: info
      processors:
        - batch:
            exporter:
              otlp:
                protocol: grpc
                endpoint: http://aspire-dashboard:18889
                insecure: true
  pipelines:
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [deltalake/otap, otlp/aspire, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, metadataprocessor, batch]
      exporters: [deltalake/otap, otlp/aspire, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [deltalake/otap, otlp/aspire, debug]

    metrics/headers:
      receivers: [otlp]
      processors: [metadataprocessor]
      exporters: [debug/headers]
