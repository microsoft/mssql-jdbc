# Scrape the OTel Collector's Prometheus exporter. Frequent scrape because the
# POC is a sandbox; tune in real deployments.
global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
